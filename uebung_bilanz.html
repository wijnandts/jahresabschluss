<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Übung: Bilanzkennzahlen</title>
    <style>
        :root { --t-light: #d6eaf8; --t-dark: #85c1e9; --t-text: #1b4f72; --t3-color: #fce4ec; --t3-dark: #f06292; --bg-calc: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        header { width: 100%; max-width: 1100px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; margin-bottom: 20px; }
        .stage-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .stage-btn { padding: 10px 18px; border: 2px solid var(--t-text); background: white; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .stage-btn.active { background: var(--t-text); color: white; }
        .btn-pro.active { background: var(--t3-dark); border-color: var(--t3-dark); }
        .main-layout { display: flex; gap: 30px; width: 100%; max-width: 1100px; }
        .content-area { flex: 2; }
        .calculator-sidebar { flex: 1; max-width: 300px; background: var(--bg-calc); padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: sticky; top: 20px; }
        #calc-display { width: 100%; height: 50px; background: #fff; border: 1px solid #ccc; border-radius: 5px; text-align: right; padding: 10px; font-size: 1.1em; margin-bottom: 10px; box-sizing: border-box; }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .calc-grid button { padding: 12px; border: 1px solid #ddd; border-radius: 5px; background: #fff; cursor: pointer; font-weight: bold; }
        .btn-op { background: #eee !important; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 0.9em; }
        th, td { border: 1px solid #ddd; padding: 10px; }
        .exercise-card { background: var(--t-light); padding: 20px; border-radius: 10px; margin-bottom: 10px; }
        .exercise-card.dark { background: var(--t-dark); }
        .exercise-card.pro { background: var(--t3-color); border: 1px solid var(--t3-dark); }
        .input-group { display: flex; gap: 10px; align-items: center; }
        .kennzahl-input { padding: 8px; width: 130px; text-align: right; font-weight: bold; }
        .stage-content { display: none; }
        .stage-content.active { display: block; }
    </style>
</head>
<body>
    <header><h1>Bilanzkennzahlen</h1><a href="index.html" style="text-decoration:none; color:var(--t-text); font-weight:bold;">← Übersicht</a></header>
    <div class="stage-selector">
        <button id="btn-s1" class="stage-btn active" onclick="showStage(1)">Stufe 1</button>
        <button id="btn-s2" class="stage-btn" onclick="showStage(2)">Stufe 2</button>
        <button id="btn-s3" class="stage-btn btn-pro" onclick="showStage(3)">Stufe 3 (Profi)</button>
    </div>
    <div class="main-layout">
        <div class="content-area">
            <div id="stage1" class="stage-content active"><div id="table-s1"></div><div id="tasks-s1"></div></div>
            <div id="stage2" class="stage-content"><div id="table-s2"></div><div id="tasks-s2"></div></div>
            <div id="stage3" class="stage-content"><div id="table-s3"></div><div id="tasks-s3"></div></div>
        </div>
        <div class="calculator-sidebar">
            <input type="text" id="calc-display" readonly placeholder="0,00">
            <div class="calc-grid">
                <button class="btn-op" onclick="add('(')">(</button><button class="btn-op" onclick="add(')')">)</button><button onclick="clr()" style="color:red">C</button><button onclick="del()">⌫</button>
                <button onclick="add('7')">7</button><button onclick="add('8')">8</button><button onclick="add('9')">9</button><button class="btn-op" onclick="add('/')">/</button>
                <button onclick="add('4')">4</button><button onclick="add('5')">5</button><button onclick="add('6')">6</button><button class="btn-op" onclick="add('*')">*</button>
                <button onclick="add('1')">1</button><button onclick="add('2')">2</button><button onclick="add('3')">3</button><button class="btn-op" onclick="add('-')">-</button>
                <button onclick="add('0')">0</button><button onclick="add('.')">,</button><button class="btn-op" onclick="add('+')">+</button><button onclick="solve()" style="background:var(--t-dark)!important">=</button>
            </div>
        </div>
    </div>
    <script>
        const numFmt = new Intl.NumberFormat('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        const euroFmt = new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' });
        function formatInput(el) { let val = el.value.replace(/[^\d]/g, ""); if (val === "") return; el.value = numFmt.format(parseInt(val, 10) / 100); }
        const pool = [
            { name: "Basis", av: 3840000, uv: 4160000, fli: 560000, ek: 3820000, lfk: 3280000, kfk: 900000 },
            { name: "Szenario B", av: 1200000, uv: 2800000, fli: 350000, ek: 1000000, lfk: 1500000, kfk: 1500000 },
            { name: "Profi", av: 15892430.2, uv: 4120570.8, fli: 1105400, ek: 10200500, lfk: 6812501, kfk: 3000000 }
        ];
        const defs = [
            { n: "Anlageintensität", f: "(AV / GV) * 100", calc: (d) => (d.av / (d.av + d.uv)) * 100 },
            { n: "Eigenkapitalquote", f: "(EK / GK) * 100", calc: (d) => (d.ek / (d.ek + d.lfk + d.kfk)) * 100 },
            { n: "Liquidität 1. Grades", f: "(Flüssig / kurzfr. FK) * 100", calc: (d) => (d.fli / d.kfk) * 100 }
        ];
        function setup(s, d) {
            document.getElementById(`table-s${s}`).innerHTML = `<h3>${d.name}</h3><table><tr><th>Aktiva</th><th>Betrag</th><th>Passiva</th><th>Betrag</th></tr><tr><td>AV</td><td>${euroFmt.format(d.av)}</td><td>EK</td><td>${euroFmt.format(d.ek)}</td></tr><tr><td>UV</td><td>${euroFmt.format(d.uv)}</td><td>lf. FK</td><td>${euroFmt.format(d.lfk)}</td></tr><tr><td>- Flüssig</td><td>${euroFmt.format(d.fli)}</td><td>kf. FK</td><td>${euroFmt.format(d.kfk)}</td></tr></table>`;
            let h = ""; defs.forEach((k, i) => { let c = k.calc(d).toFixed(2); h += `<div class="exercise-card ${s===3?'pro':(i%2?'dark':'')}"><h4>${k.n}</h4>${s===1?`<small><b>Formel:</b> ${k.f}</small><br>`:''}<div class="input-group"><input type="text" class="kennzahl-input" id="i${s}_${i}" oninput="formatInput(this)"> % <button onclick="check('i${s}_${i}', ${c})">Prüfen</button></div></div>`; });
            document.getElementById(`tasks-s${s}`).innerHTML = h;
        }
        function check(id, c) { let v = parseFloat(document.getElementById(id).value.replace(/\./g, "").replace(",", ".")); alert(Math.abs(v - c) < 0.1 ? "Richtig!" : "Falsch!"); }
        function showStage(n) { document.querySelectorAll('.stage-content').forEach(s => s.classList.remove('active')); document.querySelectorAll('.stage-btn').forEach(b => b.classList.remove('active')); document.getElementById('stage'+n).classList.add('active'); document.getElementById('btn-s'+n).classList.add('active'); }
        function add(v) { document.getElementById('calc-display').value += v; }
        function clr() { document.getElementById('calc-display').value = ''; }
        function del() { document.getElementById('calc-display').value = document.getElementById('calc-display').value.slice(0,-1); }
        function solve() { try { document.getElementById('calc-display').value = numFmt.format(eval(document.getElementById('calc-display').value)); } catch { document.getElementById('calc-display').value = 'Fehler'; } }
        window.onload = () => { setup(1, pool[0]); setup(2, pool[1]); setup(3, pool[2]); };
    </script>
</body>
</html>
