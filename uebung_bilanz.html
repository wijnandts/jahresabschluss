<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Übung: Bilanzkennzahlen</title>
    <style>
        :root {
            --t1-light: #d6eaf8;
            --t1-dark: #85c1e9;
            --t1-text: #1b4f72;
            --success: #27ae60;
            --error: #e74c3c;
            --bg-calc: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            color: #333;
            margin: 0;
            padding: 20px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 1100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        h1 { color: #2c3e50; font-weight: 300; margin: 0; }

        .back-btn {
            text-decoration: none;
            color: var(--t1-text);
            font-weight: bold;
        }

        .main-layout {
            display: flex;
            flex-direction: row;
            gap: 40px;
            width: 100%;
            max-width: 1100px;
            align-items: flex-start;
        }

        .content-area {
            flex: 2;
        }

        /* Rechner Styling */
        .calculator-sidebar {
            flex: 1;
            max-width: 320px;
            background: var(--bg-calc);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: sticky;
            top: 20px;
        }

        #calc-display {
            width: 100%;
            height: 50px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 5px;
            text-align: right;
            padding: 10px;
            font-size: 1.4em;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .calc-grid button {
            padding: 15px 5px;
            font-size: 1.1em;
            border: 1px solid #ddd;
            border-radius: 5px;
            background: #fff;
            cursor: pointer;
            transition: background 0.2s;
        }

        .calc-grid button:hover { background: #eee; }
        .btn-op { background: #f0f0f0 !important; font-weight: bold; }
        .btn-eq { background: var(--t1-dark) !important; color: white; font-weight: bold; }
        .btn-clear { background: #fab1a0 !important; color: #c0392b; }

        /* Übungskarten */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
            font-size: 0.9em;
        }
        .data-table th, .data-table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        .data-table th { background-color: var(--t1-light); }

        .exercise-card {
            background-color: var(--t1-light);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        input[type="number"] {
            padding: 8px;
            width: 120px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        @media (max-width: 900px) {
            .main-layout { flex-direction: column; }
            .calculator-sidebar { max-width: 100%; width: 100%; position: static; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Übung: Bilanzkennzahlen</h1>
        <a href="index.html" class="back-btn">← Übersicht</a>
    </header>

    <div class="main-layout">
        
        <div class="content-area">
            <table class="data-table">
                <thead>
                    <tr><th>Aktiva</th><th>T€</th><th>Passiva</th><th>T€</th></tr>
                </thead>
                <tbody>
                    <tr><td>Anlagevermögen</td><td>4.500</td><td>Eigenkapital</td><td>5.000</td></tr>
                    <tr><td>Umlaufvermögen</td><td>5.500</td><td>Fremdkapital</td><td>5.000</td></tr>
                    <tr style="font-weight:bold;"><td>Gesamt</td><td>10.000</td><td>Gesamt</td><td>10.000</td></tr>
                </tbody>
            </table>

            <div class="exercise-card">
                <h3>1. Eigenkapitalquote</h3>
                <p>Formel: (EK / GK) * 100</p>
                <div class="input-group">
                    <input type="number" id="ans1" placeholder="Ergebnis"> %
                    <button onclick="check('ans1', 50)">Prüfen</button>
                </div>
            </div>

            <div class="exercise-card" style="background-color: var(--t1-dark);">
                <h3>2. Anlagendeckung I</h3>
                <p>Formel: (EK / AV) * 100</p>
                <div class="input-group">
                    <input type="number" id="ans2" placeholder="Ergebnis"> %
                    <button onclick="check('ans2', 111.1)">Prüfen</button>
                </div>
            </div>
        </div>

        <div class="calculator-sidebar">
            <h4 style="margin-top:0; color:var(--t1-text);">Hilfsmittel: Rechner</h4>
            <input type="text" id="calc-display" readonly>
            <div class="calc-grid">
                <button class="btn-op" onclick="add('(')">(</button>
                <button class="btn-op" onclick="add(')')">)</button>
                <button class="btn-clear" onclick="clr()">C</button>
                <button class="btn-op" onclick="del()">⌫</button>
                
                <button onclick="add('7')">7</button>
                <button onclick="add('8')">8</button>
                <button onclick="add('9')">9</button>
                <button class="btn-op" onclick="add('/')">/</button>
                
                <button onclick="add('4')">4</button>
                <button onclick="add('5')">5</button>
                <button onclick="add('6')">6</button>
                <button class="btn-op" onclick="add('*')">*</button>
                
                <button onclick="add('1')">1</button>
                <button onclick="add('2')">2</button>
                <button onclick="add('3')">3</button>
                <button class="btn-op" onclick="add('-')">-</button>
                
                <button onclick="add('0')">0</button>
                <button onclick="add('.')">.</button>
                <button class="btn-eq" onclick="solve()" style="grid-column: span 2;">=</button>
            </div>
        </div>
    </div>

    <script>
        // Rechner Logik
        let d = document.getElementById('calc-display');
        function add(v) { d.value += v; }
        function clr() { d.value = ''; }
        function del() { d.value = d.value.slice(0, -1); }
        function solve() {
            try { d.value = eval(d.value); } 
            catch { d.value = 'Fehler'; }
        }

        // Übung Logik
        function check(id, correct) {
            let val = parseFloat(document.getElementById(id).value);
            if(Math.abs(val - correct) < 0.2) {
                alert("Richtig!");
            } else {
                alert("Leider falsch. Tipp: Nutze den Rechner für die Klammern!");
            }
        }
    </script>
</body>
</html>
