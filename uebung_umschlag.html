<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Übung: Umschlagskennzahlen</title>
    <style>
        :root {
            --t-light: #fcf3cf; --t-dark: #f7dc6f; --t-text: #7d6608;
            --t3-color: #fce4ec; --t3-dark: #f06292; --bg-calc: #f8f9fa;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        header { width: 100%; max-width: 1100px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        .back-btn { text-decoration: none; color: var(--t-text); font-weight: bold; }
        .stage-selector { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .stage-btn { padding: 10px 18px; border: 2px solid var(--t-text); background: white; color: var(--t-text); border-radius: 25px; cursor: pointer; font-weight: bold; }
        .stage-btn.active { background: var(--t-text); color: white; }
        .btn-pro.active { background: var(--t3-dark); border-color: var(--t3-dark); }
        .main-layout { display: flex; gap: 30px; width: 100%; max-width: 1100px; align-items: flex-start; }
        .content-area { flex: 2; }
        .calculator-sidebar { flex: 1; max-width: 300px; background: var(--bg-calc); padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: sticky; top: 20px; }
        #calc-display { width: 100%; height: 50px; background: #fff; border: 1px solid #ccc; border-radius: 5px; text-align: right; padding: 10px; font-size: 1.1em; margin-bottom: 10px; box-sizing: border-box; }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .calc-grid button { padding: 12px; border: 1px solid #ddd; border-radius: 5px; background: #fff; cursor: pointer; font-weight: bold; }
        .btn-op { background: #eee !important; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; background: #fff; font-size: 0.9em; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f2f2f2; }
        .exercise-card { background: var(--t-light); padding: 20px; border-radius: 10px; margin-bottom: 10px; }
        .exercise-card.dark { background: var(--t-dark); }
        .exercise-card.pro { background: var(--t3-color); border: 1px solid var(--t3-dark); }
        .input-group { display: flex; gap: 10px; align-items: center; }
        .kennzahl-input { padding: 8px; width: 130px; border-radius: 4px; border: 1px solid #ccc; text-align: right; font-weight: bold; }
        .check-btn { padding: 8px 15px; background: var(--t-text); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .stage-content { display: none; }
        .stage-content.active { display: block; }
    </style>
</head>
<body>

<header>
    <h1>Umschlagskennzahlen</h1>
    <a href="index.html" class="back-btn">← Übersicht</a>
</header>

<div class="stage-selector">
    <button id="btn-s1" class="stage-btn active" onclick="showStage(1)">Stufe 1</button>
    <button id="btn-s2" class="stage-btn" onclick="showStage(2)">Stufe 2</button>
    <button id="btn-s3" class="stage-btn btn-pro" onclick="showStage(3)">Stufe 3 (Profi)</button>
</div>

<div class="main-layout">
    <div class="content-area">
        <div id="stage1" class="stage-content active"><div id="table-s1"></div><div id="tasks-s1"></div></div>
        <div id="stage2" class="stage-content"><div id="table-s2"></div><div id="tasks-s2"></div></div>
        <div id="stage3" class="stage-content"><div id="table-s3"></div><div id="tasks-s3"></div></div>
    </div>

    <div class="calculator-sidebar">
        <input type="text" id="calc-display" readonly placeholder="0,00">
        <div class="calc-grid">
            <button class="btn-op" onclick="add('(')">(</button><button class="btn-op" onclick="add(')')">)</button><button onclick="clr()" style="color:red">C</button><button onclick="del()">⌫</button>
            <button onclick="add('7')">7</button><button onclick="add('8')">8</button><button onclick="add('9')">9</button><button class="btn-op" onclick="add('/')">/</button>
            <button onclick="add('4')">4</button><button onclick="add('5')">5</button><button onclick="add('6')">6</button><button class="btn-op" onclick="add('*')">*</button>
            <button onclick="add('1')">1</button><button onclick="add('2')">2</button><button onclick="add('3')">3</button><button class="btn-op" onclick="add('-')">-</button>
            <button onclick="add('0')">0</button><button onclick="add('.')">.</button><button class="btn-op" onclick="solve()" style="grid-column: span 2; background:var(--t-dark)!important">=</button>
        </div>
    </div>
</div>

<script>
    const numFmt = new Intl.NumberFormat('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const euroFmt = new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' });

    function formatInput(el) {
        let val = el.value.replace(/[^\d]/g, "");
        if (val === "") return;
        el.value = numFmt.format(parseInt(val, 10) / 100);
    }

    const pool = [
        { name: "Basis Handels GmbH", wareneinsatz: 2400000, avgLager: 400000 },
        { name: "Logistik West", wareneinsatz: 5000000, avgLager: 1250000 },
        { name: "Profi-Großhandel", wareneinsatz: 14580900, avgLager: 2145600.50 }
    ];

    const kennzahlenDef = [
        { n: "Lagerumschlagshäufigkeit", f: "Wareneinsatz / ø Lagerbestand", calc: (d) => d.wareneinsatz / d.avgLager, unit: "mal" },
        { n: "ø Lagerdauer", f: "360 Tage / Lagerumschlagshäufigkeit", calc: (d) => 360 / (d.wareneinsatz / d.avgLager), unit: "Tage" }
    ];

    function createTable(data) {
        return `<table>
            <tr><th>Posten</th><th>Betrag</th></tr>
            <tr><td>Wareneinsatz (pro Jahr)</td><td>${euroFmt.format(data.wareneinsatz)}</td></tr>
            <tr><td>ø Lagerbestand</td><td>${euroFmt.format(data.avgLager)}</td></tr>
        </table>`;
    }

    function setupStage(sNum, data) {
        document.getElementById(`table-s${sNum}`).innerHTML = `<h3>${data.name}</h3>` + createTable(data);
        let tasksHtml = "";
        kennzahlenDef.forEach((k, i) => {
            let correct = k.calc(data).toFixed(2);
            tasksHtml += `<div class="exercise-card ${sNum === 3 ? 'pro' : (i % 2 !== 0 ? 'dark' : '')}">
                <h4>${k.n}</h4>
                ${sNum === 1 ? `<small><b>Formel:</b> ${k.f}</small><br><br>` : ''}
                <div class="input-group">
                    <input type="text" class="kennzahl-input" id="in_s${sNum}_${i}" oninput="formatInput(this)" placeholder="0,00"> ${k.unit}
                    <button class="check-btn" onclick="check('in_s${sNum}_${i}', ${correct})">Prüfen</button>
                </div>
            </div>`;
        });
        document.getElementById(`tasks-s${sNum}`).innerHTML = tasksHtml;
    }

    function check(id, correct) {
        let val = parseFloat(document.getElementById(id).value.replace(/\./g, "").replace(",", "."));
        if(Math.abs(val - correct) < 0.1) alert("Richtig! Ergebnis: " + numFmt.format(correct));
        else alert("Leider falsch. Prüfe deine Berechnung!");
    }

    function showStage(num) {
        document.querySelectorAll('.stage-content').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.stage-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('stage'+num).classList.add('active');
        document.getElementById('btn-s'+num).classList.add('active');
    }

    function add(v) { document.getElementById('calc-display').value += v; }
    function clr() { document.getElementById('calc-display').value = ''; }
    function del() { document.getElementById('calc-display').value = document.getElementById('calc-display').value.slice(0,-1); }
    function solve() { try { document.getElementById('calc-display').value = numFmt.format(eval(document.getElementById('calc-display').value)); } catch { document.getElementById('calc-display').value = 'Fehler'; } }

    window.onload = () => { setupStage(1, pool[0]); setupStage(2, pool[1]); setupStage(3, pool[2]); };
</script>
</body>
</html>
