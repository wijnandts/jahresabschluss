<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lernportal - Bilanzanalyse</title>
    <style>
        :root {
            /* Thema 1: Blau (Vermögen) */
            --t1-light: #d6eaf8;
            --t1-dark: #85c1e9;
            --t1-text: #1b4f72;
            
            /* Thema 2: Grün (Kapital) */
            --t2-light: #d5f5e3;
            --t2-dark: #82e0aa;
            --t2-text: #0e6251;
            
            /* Thema 3: Gelb (Liquidität) */
            --t3-light: #fcf3cf;
            --t3-dark: #f7dc6f;
            --t3-text: #7d6608;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            color: #333;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 50px;
            color: #2c3e50;
            font-weight: 300;
            border-bottom: 3px solid #eee;
            padding-bottom: 15px;
        }

        /* Horizontale Ausrichtung der Themen-Blöcke */
        .main-grid {
            display: flex;
            flex-direction: row;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
            max-width: 1000px;
        }

        /* Vertikale Ausrichtung innerhalb eines Themas */
        .topic-column {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
            min-width: 250px;
        }

        .topic-title {
            text-align: center;
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
            text-transform: uppercase;
            font-size: 0.9em;
        }

        .tile {
            padding: 40px 20px;
            text-align: center;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.03);
        }

        .tile:hover {
            transform: scale(1.03);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Farbschemata */
        .t1-light { background-color: var(--t1-light); color: var(--t1-text); }
        .t1-dark  { background-color: var(--t1-dark);  color: var(--t1-text); }
        
        .t2-light { background-color: var(--t2-light); color: var(--t2-text); }
        .t2-dark  { background-color: var(--t2-dark);  color: var(--t2-text); }
        
        .t3-light { background-color: var(--t3-light); color: var(--t3-text); }
        .t3-dark  { background-color: var(--t3-dark);  color: var(--t3-text); }

        .contact-btn {
            margin-top: 60px;
            padding: 18px 45px;
            background-color: #2c3e50;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .contact-btn:hover {
            background-color: #34495e;
        }
    </style>
</head>
<body>

    <h1>Lernmodule Bilanzanalyse</h1>

    <div class="main-grid">
        
        <div class="topic-column">
            <div class="topic-title">Vermögensstruktur</div>
            <a href="erklaerung_vermoegen.html" class="tile t1-light">Erklärung</a>
            <a href="uebung_vermoegen.html" class="tile t1-dark">Übung</a>
        </div>

        <div class="topic-column">
            <div class="topic-title">Kapitalstruktur</div>
            <a href="erklaerung_kapital.html" class="tile t2-light">Erklärung</a>
            <a href="uebung_kapital.html" class="tile t2-dark">Übung</a>
        </div>

        <div class="topic-column">
            <div class="topic-title">Liquidität</div>
            <a href="erklaerung_liquiditaet.html" class="tile t3-light">Erklärung</a>
            <a href="uebung_liquiditaet.html" class="tile t3-dark">Übung</a>
        </div>

    </div>

    <a href="mailto:wijnandts@bk-erkelenz.de?subject=Frage%20zu%20den%20Lernmodulen" class="contact-btn">
        Dozent kontaktieren
    </a>

</body>
</html>
